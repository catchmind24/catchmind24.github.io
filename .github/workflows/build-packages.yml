name: Build Packages

on:
  push:
    branches: [main]
    paths:
      - 'debs/**'
      - 'scripts/index.sh'
      - '.github/workflows/build-packages.yml'
  workflow_dispatch:

# Never let two index builds race on push.
concurrency:
  group: build-packages
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dpkg-dev
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends dpkg-dev

      - name: Build repo index
        run: |
          chmod +x scripts/index.sh
          ./scripts/index.sh

      - name: Verify generated files
        run: |
          for f in Packages Packages.gz Release; do
            [ -s "$f" ] || { echo "❌ $f 이(가) 비어 있거나 없습니다"; exit 1; }
          done
          echo "✅ Packages / Packages.gz / Release 정상 생성"
          echo "📦 인덱싱된 패키지: $(grep -c '^Package:' Packages) 개"

      - name: Commit & push (only when changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Packages Packages.gz Release

          if git diff --cached --quiet; then
            echo "ℹ️ 변경 사항 없음 — 커밋하지 않습니다."
            exit 0
          fi

          git commit -m "chore: update repo index ($(date -u +%Y-%m-%d_%H:%M:%SZ))"

          # GitHub Pages는 이 push만으로 자동 재빌드됩니다 (더미 커밋 불필요).
          for attempt in 1 2 3; do
            if git push; then
              echo "✅ push 성공"
              exit 0
            fi
            echo "⚠️ push 실패 — 재시도 ${attempt}/3"
            git pull --rebase --autostash || true
            sleep $((attempt * 2))
          done

          echo "❌ 3회 시도 후 push 실패"
          exit 1
